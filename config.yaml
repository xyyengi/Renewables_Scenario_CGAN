# CGAN 训练配置（德国数据）
# 修改此文件后重新运行 train.py 即可生效

# ========== 数据配置 ==========
data: germany_data_final.csv        # 训练数据路径
scaler_path: germany_scaler.pkl     # 缩放器保存路径

# ========== 训练配置 ==========
epochs: 800                         # 训练轮数（优化后）
batch_size: 64                      # 批次大小（增大以稳定梯度）
seed: 42                            # 随机种子

# ========== 模型配置 ==========
noise_dim: 128                      # 噪声维度
num_classes: 3                      # 条件标签类别数（0/1/2）

# ========== WGAN-GP配置 ==========
n_critic: 5                         # 每更新1次G，更新D的次数
gp_lambda: 10.0                     # 梯度惩罚系数

# ========== 优化器配置 ==========
lr: 0.0001                          # 学习率
betas: [0.0, 0.9]                   # Adam优化器beta参数（β1=0减少动量震荡）

# ========== 输出配置 ==========
save_dir: outputs                   # 模型保存目录

# ========== 数据信息 ==========
# 训练样本数: 165
# 特征维度: 504 (Load 168h + Wind 168h + Solar 168h)
# 标签分布: {0: 55, 1: 54, 2: 56}
# 设备: cuda (GPU)
